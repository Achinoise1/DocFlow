name: Release

on:
  push:
    tags:
      - 'V*'

# 授予写权限以创建 Release
permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────
  # Job 1: 多平台构建 & 打包
  # ────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows，覆盖 Windows Server 2019 / Windows 10 及以上
          - os: windows-latest
            artifact_name: DocFlow-windows
            archive_name: DocFlow-windows
            archive_ext: zip
            exe_name: DocFlow.exe

          # macOS Intel x86_64，覆盖 macOS 13（Ventura）及以上
          - os: macos-latest
            artifact_name: DocFlow-macos-intel
            archive_name: DocFlow-macos-intel
            archive_ext: tar.gz
            exe_name: DocFlow

          # macOS Apple Silicon arm64，覆盖 macOS 14（Sonoma）及以上
          - os: macos-latest
            artifact_name: DocFlow-macos-arm
            archive_name: DocFlow-macos-arm
            archive_ext: tar.gz
            exe_name: DocFlow

          # Linux x86_64，在 ubuntu-22.04 上编译（glibc 2.35），覆盖 Ubuntu 22.04+
          - os: ubuntu-22.04
            artifact_name: DocFlow-linux
            archive_name: DocFlow-linux
            archive_ext: tar.gz
            exe_name: DocFlow

    steps:
      # ── 1. Checkout ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 环境 ─────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Visual Studio 构建工具（Windows）─────────
      #       pywin32 等 C 扩展编译时可能需要 MSVC
      - name: Set up MSBuild / MSVC (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      # ── 4. CMake（Linux / macOS）──────────────────
      #       Linux/macOS 上原生扩展若需 CMake 则可用
      - name: Verify CMake version (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake --version

      # ── 5. Linux：安装 Qt / OpenGL 运行时依赖 ─────────────────────
      #       LibreOffice 由用户自行安装，CI 构建不需要
      - name: Install system libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            libegl1 \
            libdbus-1-3 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0

      # ── 6. 安装 Python 依赖 ────────────────────────
      #       pywin32 已通过 sys_platform 标记限定为 Windows 专用
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 7. 构建可执行文件 ──────────────────────────
      #       Windows：使用 main.spec（含 pywin32 / COM 支持）
      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pyinstaller main.spec --clean -y

      #       Linux / macOS：使用 main_unix.spec（onedir，依赖系统 LibreOffice）
      - name: Build with PyInstaller (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: pyinstaller main_unix.spec --clean -y

      # ── 8b. 将安装脚本打入发布目录（Linux / macOS）──────────────────
      - name: Bundle install scripts (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp install_libreoffice.sh dist/DocFlow/
          cp install_fonts.sh dist/DocFlow/

      # ── 9. 打包压缩 ────────────────────────────────
      - name: Archive build output (Windows → zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $archive = "dist\${{ matrix.archive_name }}-${tag}.zip"
          Compress-Archive -Path "dist\${{ matrix.exe_name }}" `
                           -DestinationPath $archive
          Write-Host "Created: $archive"

      - name: Archive build output (Linux / macOS → tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          archive="dist/${{ matrix.archive_name }}-${tag}.tar.gz"
          tar -czf "$archive" -C dist "${{ matrix.exe_name }}"
          echo "Created: $archive"

      # ── 9. 上传 Artifact ───────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}-*.*
          if-no-files-found: error

  # ────────────────────────────────────────────────────
  # Job 2: 汇总所有平台产物，发布 GitHub Release
  # ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "DocFlow ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/**/*
