name: Build & Release

on:
  push:
    tags:
      - "V*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies and PyInstaller
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install --upgrade pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller main.spec

      - name: Package DocFlow.exe into zip
        run: powershell Compress-Archive -Path dist/DocFlow.exe -DestinationPath DocFlow_windows_${{ github.ref_name }}.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: docflow-windows-zip
          path: DocFlow_windows_${{ github.ref_name }}.zip

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: docflow-windows-zip
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            artifacts/DocFlow_windows_${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
