<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  DocFlow 便携式字体配置
  - 优先使用 fonts/ 目录中的嵌入字体
  - 同时保留对系统字体的回退访问
-->
<fontconfig>
  <!-- 嵌入字体目录（相对于 FONTCONFIG_PATH 的上级目录） -->
  <dir prefix="default">../fonts</dir>

  <!-- 同时扫描系统字体作为回退 -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>

  <!-- 缓存目录：使用临时目录避免权限问题 -->
  <cachedir prefix="xdg">fontconfig</cachedir>
  <cachedir>/tmp/docflow-fontcache</cachedir>

  <!-- 中文字体别名映射：优先使用 Noto Sans CJK -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK JP</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Noto Sans Mono CJK SC</family>
    </prefer>
  </alias>

  <!-- 常见中文字体名称替换（文档中引用这些字体时，自动映射到 Noto） -->
  <alias>
    <family>SimSun</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>宋体</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>SimHei</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>黑体</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>Microsoft YaHei</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>微软雅黑</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>KaiTi</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>楷体</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>FangSong</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias>
    <family>仿宋</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
</fontconfig>
